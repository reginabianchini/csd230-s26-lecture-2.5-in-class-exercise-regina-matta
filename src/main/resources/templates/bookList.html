<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Bookstore Inventory</title></head>
<body>
<h1>Book List</h1>
<table border="1">
    <thead>
    <tr>
        <th>Title</th>
        <th>Author</th>
        <th>Price</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="book : ${books}">
        <td th:text="${book.title}"></td>
        <td th:text="${book.author}"></td>
        <td th:text="${book.price}"></td>
        <td>
            <!-- Link to Edit, passing the specific book ID -->
            <a th:href="@{/books/edit/{id}(id=${book.id})}">Edit</a> |

            <a th:href="@{/books/delete/{id}(id=${book.id})}"
               onclick="return confirm('Are you sure?')">Delete</a>
        </td>

    </tr>
    </tbody>
</table>
<br/>
<a th:href="@{/books/add}">Add New Book</a>
</body>
</html>
